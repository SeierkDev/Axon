name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: npm ci --prefix packages/sdk

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
        env:
          DATABASE_PATH: ":memory:"
          NODE_ENV: test
          LOG_LEVEL: error
          SEED_SECRET: ci_seed_secret_that_is_at_least_32_chars_long

      - name: Build SDK
        run: npm run build --prefix packages/sdk

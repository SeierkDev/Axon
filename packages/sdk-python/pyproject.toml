[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axonsdk"
version = "0.1.0"
description = "Python SDK for Axon — open-source agent-to-agent infrastructure"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Axon" }]
keywords = ["axon", "ai", "agents", "sdk", "solana", "x402", "verifiable"]
dependencies = ["requests>=2.28"]

[project.urls]
Homepage = "https://axon-agents.com"
Documentation = "https://axon-agents.com/docs/sdk-python"
Repository = "https://github.com/SeierkDev/Axon"

[tool.hatch.build.targets.wheel]
packages = ["axon"]

[tool.hatch.build.targets.wheel.force-include]
"axon/py.typed" = "axon/py.typed"
